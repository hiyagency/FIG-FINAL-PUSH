version: "3.9"

services:
  app:
    build: .
    command: npm run start
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      - postgres
      - redis
      - minio
      - mailpit

  worker:
    build: .
    command: npm run worker
    env_file:
      - .env.local
    depends_on:
      - postgres
      - redis
      - minio
      - mailpit

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lead_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
  redis-data:
  minio-data:
